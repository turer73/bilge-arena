<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <defs>
    <linearGradient id="shieldGrad" x1="50" y1="8" x2="50" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="50" y1="18" x2="50" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#060E1F"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="50" y1="0" x2="50" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dış halkalar -->
  <circle cx="50" cy="52" r="44" stroke="#2563EB" stroke-width="0.5" stroke-opacity="0.3" fill="none"/>
  <circle cx="50" cy="52" r="38" stroke="#2563EB" stroke-width="0.3" stroke-opacity="0.15" fill="none"/>

  <!-- Parıltı -->
  <ellipse cx="50" cy="50" rx="40" ry="40" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Ana kalkan -->
  <path d="M50 12 L78 22 L78 48 C78 65 65 78 50 84 C35 78 22 65 22 48 L22 22 Z"
        fill="url(#shieldGrad)" stroke="url(#rimGrad)" stroke-width="1.5"/>

  <!-- İç kalkan -->
  <path d="M50 18 L72 27 L72 48 C72 62 61 73 50 78 C39 73 28 62 28 48 L28 27 Z"
        fill="url(#innerGrad)" opacity="0.9"/>

  <!-- Kenar çizgisi -->
  <path d="M50 20 L70 28 L70 48 C70 61 60 71 50 76 C40 71 30 61 30 48 L30 28 Z"
        fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Yatay dekoratif çizgi -->
  <line x1="33" y1="42" x2="67" y2="42" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- B harfi -->
  <text x="50" y="68" text-anchor="middle" font-size="36" font-weight="900"
        font-family="Georgia, Times New Roman, serif" fill="#EFF6FF"
        filter="url(#glow)" letter-spacing="-1">B</text>

  <!-- Taç -->
  <path d="M38 14 L38 8 L44 12 L50 6 L56 12 L62 8 L62 14 L38 14 Z"
        fill="url(#crownGrad)" filter="url(#softGlow)"/>
  <rect x="37" y="13.5" width="26" height="2" rx="1" fill="#D97706"/>
  <circle cx="44" cy="10.5" r="1.5" fill="#F59E0B"/>
  <circle cx="50" cy="8"    r="2"   fill="#F59E0B"/>
  <circle cx="56" cy="10.5" r="1.5" fill="#F59E0B"/>

  <!-- Alt süslemeler -->
  <path d="M30 72 Q25 78 28 84" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <path d="M70 72 Q75 78 72 84" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <path d="M44 80 L50 86 L56 80" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>