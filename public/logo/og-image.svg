<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="100%" stop-color="#0C1527"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="400" ry="300" fill="url(#glow)"/>
  <!-- Grid -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Büyük logo -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="96"
        font-weight="900" fill="#3B82F6" letter-spacing="-2">Bilge</text>
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="96"
        font-weight="900" fill="#D97706" letter-spacing="-2">Arena</text>
  <!-- Alt yazı -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="28"
        font-weight="600" fill="#475569" letter-spacing="8">YKS HAZIRLIK PLATFORMU</text>
  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="22"
        fill="#64748B" font-style="italic">Öğren. Kazan. Yüksel.</text>
  <!-- Köşe süsü -->
  <rect x="0" y="0" width="8" height="630" fill="#2563EB" opacity="0.6"/>
  <rect x="1192" y="0" width="8" height="630" fill="#D97706" opacity="0.4"/>
</svg>