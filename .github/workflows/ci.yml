name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  type-check:
    name: 🔒 Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run type-check

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      SENTRY_AUTH_TOKEN: ""
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # master push'larinda Vercel'e otomatik deploy
      # Vercel API ile mevcut basarili deploy'u redeploy eder
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          DEPLOY_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&teamId=${{ secrets.VERCEL_ORG_ID }}&target=production&state=READY&limit=1" \
            | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);console.log(j.deployments?.[0]?.uid||'')})")

          if [ -z "$DEPLOY_ID" ]; then echo "No ready deployment found"; exit 0; fi

          echo "Redeploying $DEPLOY_ID..."
          RESULT=$(curl -s -X POST -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"bilge-arena\",\"deploymentId\":\"$DEPLOY_ID\",\"target\":\"production\"}" \
            "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_ORG_ID }}")

          echo "$RESULT" | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);if(j.error){console.error(j.error.message);process.exit(1)}console.log('Deployed:',j.url)})"
